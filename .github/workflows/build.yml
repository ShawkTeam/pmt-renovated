name: Build and release

on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cleanup
        id: cleanup
        uses: rokibhasansagar/slimhub_actions@main

      - name: Setup Packages
        id: setup-packages
        run: |
          sudo apt update
          sudo apt upgrade -y
          sudo apt install make ninja-build cmake extra-cmake-modules zip gh -y

      - name: Setup Android NDK
        id: setup-ndk
        run: |
          wget "https://dl.google.com/android/repository/android-ndk-r29-linux.zip"
          unzip *.zip && rm *.zip
        working-directory: ${{ github.workspace }}

      - name: Build And Prepare For Release
        id: build
        run: |
          git submodule update --init --recursive --depth 1
          export ANDROID_NDK="${{ github.workspace }}/android-ndk-r29"
        
          bash build/scripts/build.sh clean
          bash build/scripts/build.sh build -DCMAKE_BUILD_TYPE=Release
        
          # ARM64-V8A
          cd build_arm64-v8a
          cp src/pmt src/pmt_static src/plugins/*plugin.so srclib/libhelper/libhelper.* srclib/libpartition_map/libpartition_map.* .
          zip pmt-arm64-v8a.zip pmt libhelper.* libpartition_map.* *plugin.so
          zip pmt-static-arm64-v8a.zip pmt_static
        
          # ARM64-V8A Builtin
          cd ../build_arm64-v8a-builtin
          cp src/pmt src/pmt_static srclib/libhelper/libhelper.* srclib/libpartition_map/libpartition_map.* .
          zip pmt-arm64-v8a-builtin.zip pmt libhelper.* libpartition_map.*
        
          # ARMEABI-V7A
          cd ../build_armeabi-v7a
          cp src/pmt src/pmt_static src/plugins/*plugin.so srclib/libhelper/libhelper.* srclib/libpartition_map/libpartition_map.* .
          zip pmt-armeabi-v7a.zip pmt libhelper.* libpartition_map.* *plugin.so
          zip pmt-static-armeabi-v7a.zip pmt_static
        
          # ARMEABI-V7A Builtin
          cd ../build_armeabi-v7a-builtin
          cp src/pmt src/pmt_static srclib/libhelper/libhelper.* srclib/libpartition_map/libpartition_map.* .
          zip pmt-armeabi-v7a-builtin.zip pmt libhelper.* libpartition_map.*

          echo "BUILD_DATE=$(date +%Y%m%d)" >> $GITHUB_ENV
          cd ${{ github.workspace }}
          echo -e "Read [Documentation - Release Types](https://documentations.yzbruh.com.tr/pmt-renovated/release-types.html) for getting more information.\n\n### Changes\n" > release.txt
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
        
          if [ -z "$LATEST_TAG" ]; then
            COMMIT_RANGE=""
          else
            COMMIT_RANGE="$LATEST_TAG..HEAD"
          fi
        
          git log $COMMIT_RANGE \
            --no-merges \
            --pretty=format:'%ad|%s|%h|%H' \
            --date=short |
          awk -F'|' '
          {
            subject = $2
            sub(/ - .*/, "", subject)
            gsub(/[[:space:]]+$/, "", subject)
            printf "* %s | %s ([%s](https://github.com/ShawkTeam/pmt-renovated/commit/%s))\n",
                   $1, subject, $3, $4
          } ' | grep -v cleanup >> release.txt
        working-directory: ${{ github.workspace }}

      - name: Create GitHub Release and Upload Assets
        id: create-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${{ env.BUILD_DATE }}"
          gh release create "$TAG_NAME" \
            --title "Partition Manager Tool Release $TAG_NAME" \
            --notes-file "${{ github.workspace }}/release.txt" \
            ${{ github.workspace }}/build_arm64-v8a/*.zip \
            ${{ github.workspace }}/build_arm64-v8a-builtin/*.zip \
            ${{ github.workspace }}/build_armeabi-v7a/*.zip \
            ${{ github.workspace }}/build_armeabi-v7a-builtin/*.zip

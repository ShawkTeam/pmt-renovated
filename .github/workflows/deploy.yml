name: Build and Deploy Doxygen Docs

on:
  workflow_dispatch:
    inputs:
      DOCS_PATH:
        description: 'Path for uploading doxygen artifacts.'
        required: true
        default: '/var/www/documentations/pmt-renovated-git'
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'docs/**'
      - 'srclib/**'
      - 'include/**'
      - 'Doxyfile'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DOCS_PATH: ${{ github.event.inputs.DOCS_PATH || '/var/www/documentations/pmt-renovated-git' }}
    container:
      image: archlinux:latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Doxygen
        run: pacman -Sy && pacman -S --noconfirm doxygen graphviz rsync openssh

      - name: Run Doxygen
        run: doxygen Doxyfile

      - name: Setup SSH
        run: |
          mkdir -p /root/.ssh
          echo "${{ secrets.VDS_SSH_KEY }}" | tr -d '\r' > /root/.ssh/id_ed25519
          chmod 600 /root/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.VDS_HOST }}" >> /root/.ssh/known_hosts
          chmod 600 /root/.ssh/known_hosts

      - name: Deploy to VDS
        run: |
          rsync -avz --delete \
            -e "ssh -i /root/.ssh/id_ed25519 -o UserKnownHostsFile=/root/.ssh/known_hosts" \
            docs/html/ \
            ${{ secrets.VDS_USER }}@${{ secrets.VDS_HOST }}:$DOCS_PATH

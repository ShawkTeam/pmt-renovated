name: Build and Deploy Doxygen Docs

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'docs/**'
      - 'srclib/**'
      - 'include/**'
      - 'Doxyfile'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Doxygen
        run: sudo pacman -Sy && sudo pacman -S --noconfirm doxygen graphviz rsync

      - name: Run Doxygen
        run: doxygen Doxyfile

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VDS_SSH_KEY }}" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.VDS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy to VDS
        run: |
          rsync -avz --delete docs/html/ \
            ${{ secrets.VDS_USER }}@${{ secrets.VDS_HOST }}:/var/www/documentations/pmt-renovated/


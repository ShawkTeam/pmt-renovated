name: Deploy Doxygen Docs

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'docs/**'
      - 'srclib/**'
      - 'include/**'
      - 'Doxyfile'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Doxygen
        run: sudo apt update && sudo apt-get install -y doxygen graphviz

      - name: Run Doxygen
        run: doxygen Doxyfile

      - name: Move docs to subdirectory
        run: |
          mkdir -p site/pmt-documentation
          cp -r docs/html/* site/pmt-documentation/
          echo '<meta http-equiv="refresh" content="0; url=/pmt-documentation/">' > site/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - uses: actions/deploy-pages@v4
